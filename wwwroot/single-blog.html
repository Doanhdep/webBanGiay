<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Gallery Bootstrap 4 - Collapse</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

</head>
<body>

    <img id="zoom_01" src='./Image/46SMA0045-02H.jpg' data-zoom-image="./Image/46SMA0045-02H.jpg" />

    <script>
        //<![CDATA[


        window.addEventListener('load', function () {

            $("#zoom_01").elevateZoom({

                scrollZoom: true

            });

        })

        //]]>
    </script>

</body>
</html>
