    <style>
        .profile-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
        }

        .image-container {
            border-left: 1px solid #ccc;
            padding-left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .link-button {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <h2>My Profile</h2>
        <p>Manage and protect your account</p>
        <form>
            <div class="form-row">
                <div class="col-md-8">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" id="username" value="af2W0hsqli" readonly>
                        <small class="form-text text-muted">Username can only be changed once.</small>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" id="email" value="ng********@gmail.com">
                        <button class="link-button float-right" type="button">Change</button>
                    </div>

                    <div class="form-group">
                        <label for="email">Phone Number</label>
                        <input type="text" class="form-control" id="email" value="0398434001">
                        <button class="link-button float-right" type="button">Change</button>
                    </div>

                    <div class="form-group">
                        <label>Gender</label><br>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of birth</label>
                        <div class="form-row">
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Day" id="dob-day">
                            </div>
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Month" id="dob-month">
                            </div>
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Year" id="dob-year">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Save</button>
                </div>

                <div class="col-md-4 image-container">
                    <div class="d-flex flex-column align-items-center">

                        <img src="../Image/WIN_20250216_20_10_15_Pro.jpg" alt="Profile Image" class="profile-image mb-2" >
                        <label class="genric-btn success-border medium" for="image" style="font-size:15px">Choose File</label>
                        <input type="file" class="d-none" id="image">
                        <small class="form-text text-muted" style="font-size:15px">File size: maximum 1 MB<br>File extension: JPEG, PNG</small>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script src="js/main.js"></script>
